name: Markdown lint

on:
  pull_request:
    paths:
      - '**/*.md'
      - '.markdownlint.jsonc'
  push:
    branches: [main]
    paths:
      - '**/*.md'
      - '.markdownlint.jsonc'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: '**/*.md'
