name: External link check

on:
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

# Runs weekly (Monday 04:17 UTC). Links often break silently; a scheduled
# check catches them without blocking PRs.

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-path node_modules
            --exclude-path docs-site/node_modules
            --exclude-path _site
            './**/*.md'
          fail: false
